app = "vedaapex-saas-api"
primary_region = "sin"
kill_signal = "SIGTERM"
kill_timeout = "30s"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "8080"
  ENABLE_INLINE_QUEUE_WORKERS = "false"
  ENABLE_SWAGGER = "false"
  ENABLE_CSRF = "true"
  MEDIA_PROCESSOR_MODE = "http"
  MEDIA_PROCESSOR_BASE_URL = "http://vedaapex-media.internal:8000/api/v1/media-processor"

[deploy]
  release_command = "npx prisma migrate deploy"
  strategy = "rolling"
  release_command_timeout = "10m"

[processes]
  web = "node dist/server.js"
  worker = "node dist/worker.js"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["web"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 50
    hard_limit = 100

[[http_service.checks]]
  grace_period = "20s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
  processes = ["web"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
  processes = ["worker"]
