version: "3.9"

services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/vedaapex.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    restart: unless-stopped

  api:
    build:
      context: ./vedaapex-backend
      dockerfile: Dockerfile
    env_file:
      - ./vedaapex-backend/.env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      media-processor:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  worker:
    build:
      context: ./vedaapex-backend
      dockerfile: Dockerfile
    command: node dist/worker.js
    env_file:
      - ./vedaapex-backend/.env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      media-processor:
        condition: service_started
    restart: unless-stopped

  media-processor:
    build:
      context: .
      dockerfile: Dockerfile
    command: gunicorn app.main:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --workers 2 --timeout 300
    env_file:
      - ./media-processor.env.production
    depends_on:
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    volumes:
      - media_uploads:/workspace/app/uploads
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vedaapex}
      POSTGRES_USER: ${POSTGRES_USER:-vedaapex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_ME}
    command: postgres -c max_connections=200 -c shared_buffers=256MB
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vedaapex} -d ${POSTGRES_DB:-vedaapex}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  media_uploads:
