upstream vedaapex_api {
    server api:8080;
    keepalive 32;
}

server {
    listen 80;
    server_name api.vedaapex.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.vedaapex.com;

    ssl_certificate /etc/letsencrypt/live/api.vedaapex.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.vedaapex.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;

    client_max_body_size 128m;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types application/json application/javascript text/css text/plain application/xml;

    location / {
        proxy_pass http://vedaapex_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /health {
        proxy_pass http://vedaapex_api/health;
    }
}
