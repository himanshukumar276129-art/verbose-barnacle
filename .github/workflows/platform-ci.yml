name: Platform CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  node-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vedaapex-backend
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/vedaapex?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci-access-secret-64-characters-000000000000000000000000000001
      JWT_REFRESH_SECRET: ci-refresh-secret-64-characters-0000000000000000000000000001
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vedaapex-backend/package-lock.json

      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma validate
      - run: npm run build

  python-media:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m compileall app
