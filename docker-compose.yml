version: '3.8'

services:
  # ─── Redis Message Broker & Rate Limiting Cache ─────────
  redis:
    image: redis:7-alpine
    container_name: vedaapex_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── FastAPI Core SaaS Web Hub ──────────────────────────
  web:
    build: .
    container_name: vedaapex_web
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - .:/workspace
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite:///./workspace/vedaapex.db
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME}
      - R2_ENDPOINT_URL=${R2_ENDPOINT_URL}
      - WEBHOOK_NOTIFICATION_URL=${WEBHOOK_NOTIFICATION_URL}
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ─── Celery Queue Worker (Media Processor Engine) ───────
  worker:
    build: .
    container_name: vedaapex_worker
    # Run Celery worker listening to tasks from tasks.py
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - .:/workspace
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite:///./workspace/vedaapex.db
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME}
      - R2_ENDPOINT_URL=${R2_ENDPOINT_URL}
      - WEBHOOK_NOTIFICATION_URL=${WEBHOOK_NOTIFICATION_URL}
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
