services:
  - type: keyvalue
    name: vedaapex-redis
    plan: starter

  - type: web
    name: vedaapex-api
    runtime: docker
    dockerContext: ./vedaapex-backend
    dockerfilePath: ./vedaapex-backend/Dockerfile
    plan: starter
    region: singapore
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: APP_BASE_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: vedaapex-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: vedaapex-redis
          property: connectionString
      - key: ENABLE_SWAGGER
        value: "false"
      - key: ENABLE_CSRF
        value: "true"
      - key: ENABLE_INLINE_QUEUE_WORKERS
        value: "false"
      - key: ALLOWED_ORIGINS
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: FIREBASE_STORAGE_BUCKET
        sync: false
      - key: STORAGE_PROVIDER
        value: r2
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_PUBLIC_BASE_URL
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MEDIA_PROCESSOR_MODE
        value: http
      - key: MEDIA_PROCESSOR_BASE_URL
        value: http://vedaapex-media:8000/api/v1/media-processor
      - key: MEDIA_PROCESSOR_API_KEY
        sync: false

  - type: worker
    name: vedaapex-worker
    runtime: docker
    dockerContext: ./vedaapex-backend
    dockerfilePath: ./vedaapex-backend/Dockerfile
    dockerCommand: node dist/worker.js
    plan: starter
    region: singapore
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: vedaapex-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: vedaapex-redis
          property: connectionString
      - key: ENABLE_INLINE_QUEUE_WORKERS
        value: "false"
      - key: STORAGE_PROVIDER
        value: r2
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_PUBLIC_BASE_URL
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: MEDIA_PROCESSOR_MODE
        value: http
      - key: MEDIA_PROCESSOR_BASE_URL
        value: http://vedaapex-media:8000/api/v1/media-processor
      - key: MEDIA_PROCESSOR_API_KEY
        sync: false

  - type: pserv
    name: vedaapex-media
    runtime: docker
    dockerContext: .
    dockerfilePath: ./Dockerfile
    dockerCommand: gunicorn app.main:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --workers 2 --timeout 300
    plan: starter
    region: singapore
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vedaapex-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: vedaapex-redis
          property: connectionString
      - key: MEDIA_ALLOWED_ORIGINS
        sync: false
      - key: MEDIA_PROCESSOR_API_KEY
        sync: false
      - key: MEDIA_PUBLIC_BASE_URL
        sync: false
      - key: R2_ENDPOINT_URL
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false

databases:
  - name: vedaapex-postgres
    plan: starter
    databaseName: vedaapex
    user: vedaapex
